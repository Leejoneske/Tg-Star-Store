    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        *:focus {
            outline: none !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface-muted);
            color: var(--text);
            overflow: hidden;
        }

        #app-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface-muted);
            position: relative;
            overflow: hidden;
        }

        .telegram-fullscreen #app-root {
            max-width: 100%;
            width: 100%;
            margin: 0;
        }

        #main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--surface-muted);
        }

        .loading-content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--error);
            padding: 20px;
        }

        .error-state p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <div id="main-content" class="loading-content">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Core Scripts (in order) -->
    <script src="/js/theme.js"></script>
    <script src="/js/translations.js?v=4"></script>
    <script src="/js/loading.js?v=1"></script>
    <script src="/js/version.js?v=1"></script>
    <script src="/js/api.js?v=4"></script>
    <script src="/js/reconnect.js?v=2"></script>
    <script src="/js/spa-router.js"></script>

    <script>
        /**
         * Initialize SPA Application
         */
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize Telegram WebApp early
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                document.body.classList.add('telegram-fullscreen');
            }

            // Initialize translations
            if (window.initTranslations) {
                window.initTranslations();
            }

            // Initialize theme
            if (typeof updateTheme === 'function') {
                updateTheme();
            }

            // Verify global APIs are available
            const apisAvailable = {
                axios: typeof axios !== 'undefined',
                fetch: typeof fetch !== 'undefined',
                Telegram: typeof window.Telegram !== 'undefined',
                TranslationUtils: typeof TranslationUtils !== 'undefined'
            };
            
            console.log('✓ Global APIs loaded:', apisAvailable);

            // Test API connectivity
            try {
                const statusResponse = await fetch('/api/spa-status');
                const statusData = await statusResponse.json();
                console.log('✓ Backend API Connected:', statusData);
            } catch (error) {
                console.error('✗ Backend API connection failed:', error);
            }

            // Initialize router
            const router = new SPARouter();
            const mainContent = document.getElementById('main-content');

            // Store router globally for page scripts
            window.router = router;

            // Register all routes
            registerRoutes(router);

            // Setup hooks
            router.setBeforeEach(async (to) => {
                // Add loading state
                mainContent.innerHTML = '<div class="loading-content"><div class="loading-spinner"></div></div>';
                return true;
            });

            router.setAfterEach(async (nav) => {
                // Update translations if needed
                if (typeof TranslationUtils !== 'undefined') {
                    TranslationUtils.applyTranslations();
                }
                
                // Re-expand Telegram WebApp for loaded content
                if (window.Telegram?.WebApp) {
                    try {
                        window.Telegram.WebApp.expand();
                    } catch (e) {
                        // Telegram might not be available in non-Telegram context
                    }
                }
                
                console.log('✓ Page loaded:', nav.path);
            });

            // Initialize router
            try {
                router.init(mainContent);
                console.log('✓ SPA Router initialized successfully');
            } catch (error) {
                console.error('✗ SPA Router initialization failed:', error);
                mainContent.innerHTML = `<div class="error-state"><p>App initialization failed: ${error.message}</p></div>`;
            }
        });

        /**
         * Register all routes
         */
        function registerRoutes(router) {
            // Home/Dashboard - load original index content
            router.register('/', async () => {
                const response = await fetch('/index-original.html');
                const html = await response.text();
                // Extract body content
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const appContainer = temp.querySelector('.app-container');
                return appContainer ? appContainer.innerHTML : html;
            }, { name: 'home' });

            // Buy - use original index.html (same as home)
            router.register('/buy', async () => {
                const response = await fetch('/index-original.html');
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const app = temp.querySelector('.app-container');
                return app ? app.innerHTML : html;
            }, { name: 'buy' });

            // Sell
            router.register('/sell', async () => {

            }, { name: 'sell' });

            // Daily

            }, { name: 'daily' });

            // History

            }, { name: 'history' });

            // Referral

                return app ? app.innerHTML : html;
            }, { name: 'referral' });

            // Feedback
            router.register('/feedback', async () => {
                const response = await fetch('/feedback.html');

                temp.innerHTML = html;
                const app = temp.querySelector('.app-container');
                return app ? app.innerHTML : html;
            }, { name: 'feedback' });

            // About
            router.register('/about', async () => {
                const response = await fetch('/about.html');
                const html = await response.text();
                const temp = document.createElement('div');

                const app = temp.querySelector('.app-container');

            }, { name: 'about' });

            // Notification
            router.register('/notification', async () => {
                const response = await fetch('/notification.html');

                const app = temp.querySelector('.app-container');

            }, { name: 'notification' });

            // Support
            router.register('/support', async () => {
                const response = await fetch('/support.html');
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const app = temp.querySelector('.app-container');
                return app ? app.innerHTML : html;
            }, { name: 'support' });

            // Policy
            router.register('/policy', async () => {
                const response = await fetch('/policy.html');
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const app = temp.querySelector('.app-container');
                return app ? app.innerHTML : html;
            }, { name: 'policy' });
        }
    </script>
</body>
</html>
