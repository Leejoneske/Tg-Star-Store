    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(79, 70, 229, 0.3);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            padding-bottom: 80px;
        }

        .telegram-fullscreen .app-container {
            max-width: 100%;
            width: 100%;
            margin: 0;
            box-shadow: none;
            border-radius: 0;
        }

        .clean-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .clean-card:active {
            transform: scale(0.98);
        }

        .stat-box {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .stat-box:active {
            transform: scale(0.97);
            background: #f3f4f6;
        }

        .language-toggle {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .language-toggle:active {
            background: #eef2ff;
            border-color: #4f46e5;
        }

        .transaction-card {
            border-radius: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        .transaction-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.12);
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .status-completed {
            background: #ecfdf5;
            color: #059669;
        }

        .status-processing {
            background: #eff6ff;
            color: #2563eb;
        }

        .status-declined {
            background: #fef2f2;
            color: #dc2626;
        }

        .status-failed {
            background: #fef2f2;
            color: #dc2626;
        }

        .status-expired {
            background: #fef2f2;
            color: #dc2626;
        }

        .status-active {
            background: #ecfdf5;
            color: #059669;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            color: #9ca3af;
            text-align: center;
        }

        .empty-state svg {
            width: 88px;
            height: 88px;
            color: #e5e7eb;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .empty-state p {
            font-size: 15px;
            font-weight: 500;
            color: #6b7280;
        }

        .pagination-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #e5e7eb;
            background: white;
            color: #6b7280;
            cursor: pointer;
        }

        .pagination-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .pagination-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .filter-active {
            background: #eef2ff;
            color: #4f46e5;
            border-color: #4f46e5;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }

        .shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.2) 20%, 
                rgba(255,255,255,0.5) 60%, 
                rgba(255,255,255,0) 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            background: white;
            color: #6b7280;
            transition: all 0.2s;
        }

        .filter-btn:active {
            transform: scale(0.96);
        }

        .filter-btn.filter-active {
            background: #eef2ff;
            color: #4f46e5;
            border-color: #4f46e5;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            background: #f9fafb;
            color: #1f2937;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            width: 16px;
            height: 16px;
        }

        .tab-header {
            display: flex;
            border-bottom: 2px solid #f3f4f6;
            margin-bottom: 18px;
            gap: 24px;
        }

        .tab-btn {
            padding: 12px 0;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #9ca3af;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .tab-btn.tab-active {
            color: #4f46e5;
        }

        .tab-btn.tab-active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #4f46e5;
        }

        .export-btn {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .export-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
        }

        .export-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 22px rgba(79, 70, 229, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: rgba(79, 70, 229, 0.08);
            border: 1px solid rgba(79, 70, 229, 0.2);
            color: #4f46e5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            transform: translateY(-1px);
            background: rgba(79, 70, 229, 0.14);
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="bottomnav-container"></div>

        <!-- Page Header -->
        <header class="px-4 py-3 bg-white border-b border-gray-200">
            <div class="flex items-center justify-between gap-3">
                <h1 class="text-base font-semibold text-gray-900" data-translate="history">Transaction History</h1>
                <button id="refreshBtn" class="inline-flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm font-semibold text-gray-700 shadow-sm transition hover:bg-gray-50" type="button" data-translate="refresh">

    <!-- Export Modals -->

<script>
// Initialize Telegram WebApp
if (window.Telegram?.WebApp) {
    const webApp = window.Telegram.WebApp;
    webApp.ready();
    webApp.expand();
    
    // Add fullscreen class to body
    document.body.classList.add('telegram-fullscreen');
    
    console.log('Telegram Mini App mode enabled');
}

// Safe DOM manipulation helpers
function safeGetElement(id) {
    const el = document.getElementById(id);
    if (!el) console.warn(`⚠️ Element not found: ${id}`);
    return el;
}

function safeSetDisplay(id, display) {
    const el = safeGetElement(id);
    if (el) el.style.display = display;
}

function safeSetHTML(id, html) {
    const el = safeGetElement(id);
    if (el) el.innerHTML = html;
}

function safeSetText(id, text) {
    const el = safeGetElement(id);
    if (el) el.textContent = text;
}

const user = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) ? window.Telegram.WebApp.initDataUnsafe.user : null;
const BASE_API_URL = window.location.origin + '/api';

let transactionHistory = [];
let referralHistory = [];
let currentTransactionPage = 1;
let currentReferralPage = 1;
let currentTransactionFilter = 'all';
let currentReferralFilter = 'all';
let currentTransactionSearch = '';
let currentReferralSearch = '';
const itemsPerPage = 5;
let currentLanguage = TranslationUtils.getCurrentLanguage();

// Initialize translations
if (typeof TranslationUtils !== 'undefined') {
    TranslationUtils.init();
}

// Listen for language changes from other pages
window.addEventListener('languageChanged', () => {
    currentLanguage = TranslationUtils.getCurrentLanguage();
    updateLanguage();
});

// Also listen for localStorage changes (when language is changed in another tab/page)
window.addEventListener('storage', (e) => {
    if (e.key === 'appLanguage') {
        currentLanguage = TranslationUtils.getCurrentLanguage();
        updateLanguage();
    }
});

document.addEventListener('DOMContentLoaded', () => {
    initApp();
});



function initApp() {

    
    updateLanguage();
    setupEventListeners();
    loadTransactionHistory();
    loadReferralHistory();
    window.addEventListener('storage', (event) => {
        if (event.key === 'appLanguage') {
            currentLanguage = event.newValue || 'en';
            updateLanguage();
        }
    });
    // load shared bottom nav
    fetch('/bottomnav.html').then(r => r.ok ? r.text() : '').then(html => { 
        document.getElementById('bottomnav-container').innerHTML = html; 
        // Apply translations to bottom nav after loading
        if (typeof TranslationUtils !== 'undefined') {
            TranslationUtils.applyTranslations();
        }
    });
}

let activeTab = 'transactions';

function setupEventListeners() {
    document.getElementById('transactionsTab').addEventListener('click', () => switchTab('transactions'));
    document.getElementById('referralsTab').addEventListener('click', () => switchTab('referrals'));

    const tabFilters = document.getElementById('tabFilters');
    tabFilters.addEventListener('click', (event) => {
        const filterBtn = event.target.closest('button[data-filter]');
        if (filterBtn) {
            const filter = filterBtn.getAttribute('data-filter');
            if (activeTab === 'transactions') {
                currentTransactionFilter = filter;
                currentTransactionPage = 1;
                updateTransactionList();
            } else {
                currentReferralFilter = filter;
                currentReferralPage = 1;
                updateReferralList();
            }

            tabFilters.querySelectorAll('button[data-filter]').forEach(b => b.classList.remove('filter-active'));
            filterBtn.classList.add('filter-active');
            return;
        }

        const actionBtn = event.target.closest('button[data-action]');
        if (actionBtn && actionBtn.getAttribute('data-action') === 'clear-filters') {
            clearFilters();
        }
    });

    document.getElementById('searchTransactions').addEventListener('input', (e) => {
        currentTransactionSearch = e.target.value.trim();
        currentTransactionPage = 1;
        if (activeTab === 'transactions') updateTransactionList();
    });

    document.getElementById('searchReferrals').addEventListener('input', (e) => {
        currentReferralSearch = e.target.value.trim();
        currentReferralPage = 1;
        if (activeTab === 'referrals') updateReferralList();
    });

    document.getElementById('exportCurrent').addEventListener('click', () => {
        if (activeTab === 'transactions') exportTransactions();
        else exportReferrals();
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadTransactionHistory();
        loadReferralHistory();
    });

    // Initialize the UI state
    switchTab(activeTab);
}

function switchTab(tab) {
    activeTab = tab;
    const transactionsTab = document.getElementById('transactionsTab');
    const referralsTab = document.getElementById('referralsTab');
    const transactionsContent = document.getElementById('transactionsContent');
    const referralsContent = document.getElementById('referralsContent');
    const searchTransactions = document.getElementById('searchTransactions');
    const searchReferrals = document.getElementById('searchReferrals');

    transactionsTab.classList.toggle('tab-active', tab === 'transactions');
    referralsTab.classList.toggle('tab-active', tab === 'referrals');
    transactionsContent.classList.toggle('active', tab === 'transactions');
    referralsContent.classList.toggle('active', tab === 'referrals');

    // Show the relevant search input
    searchTransactions.classList.toggle('hidden', tab !== 'transactions');
    searchReferrals.classList.toggle('hidden', tab !== 'referrals');

    renderFiltersForTab(tab);
    updateExportButtonText();

    if (tab === 'transactions') {
        updateTransactionList();
    } else {
        updateReferralList();
    }
}

function renderFiltersForTab(tab) {

function mapOrderStatus(status) {
    // Don't map statuses - use them as-is
    // This allows frontend to display the actual status (failed, expired, declined, etc)
    if (!status || typeof status !== 'string') return 'processing';
    return status.toLowerCase();
}

function mapReferralStatus(status) {
    const statusMap = {
        'completed': 'active',
        'active': 'active',
        'pending': 'processing',
        'processing': 'processing'
    };
    if (!status || typeof status !== 'string') return 'processing';
    return statusMap[status.toLowerCase()] || 'processing';
}

function updatePagination(elementId, currentPage, totalPages, callback) {
    const paginationContainer = document.getElementById(elementId);
    if (!paginationContainer) {
        console.warn(`⚠️ Pagination container not found: ${elementId}`);
        return;
    }
    paginationContainer.innerHTML = '';
    if (totalPages <= 1) return;
    
    const prevButton = document.createElement('button');
    prevButton.className = 'pagination-btn border';
    prevButton.innerHTML = '&lt;';
    prevButton.setAttribute('data-translate', 'previous');
    prevButton.disabled = currentPage === 1;
    prevButton.addEventListener('click', () => {
        if (currentPage > 1) callback(currentPage - 1);
    });
    paginationContainer.appendChild(prevButton);
    
    const maxVisiblePages = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    
    if (endPage - startPage + 1 < maxVisiblePages) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
    }
    
    if (startPage > 1) {
        const firstButton = document.createElement('button');
        firstButton.className = 'pagination-btn border';
        firstButton.textContent = '1';
        firstButton.addEventListener('click', () => callback(1));
        paginationContainer.appendChild(firstButton);
        
        if (startPage > 2) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'px-2';
            ellipsis.textContent = '...';
            ellipsis.setAttribute('data-translate', 'ellipsis');
            paginationContainer.appendChild(ellipsis);
        }
    }
    
    for (let i = startPage; i <= endPage; i++) {
        const pageButton = document.createElement('button');
        pageButton.className = `pagination-btn border ${i === currentPage ? 'active' : ''}`;
        pageButton.textContent = i;
        pageButton.addEventListener('click', () => callback(i));
        paginationContainer.appendChild(pageButton);
    }
    
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'px-2';
            ellipsis.textContent = '...';
            ellipsis.setAttribute('data-translate', 'ellipsis');
            paginationContainer.appendChild(ellipsis);
        }
        
        const lastButton = document.createElement('button');
        lastButton.className = 'pagination-btn border';
        lastButton.textContent = totalPages;
        lastButton.addEventListener('click', () => callback(totalPages));
        paginationContainer.appendChild(lastButton);
    }
    
    const nextButton = document.createElement('button');
    nextButton.className = 'pagination-btn border';
    nextButton.innerHTML = '&gt;';
    nextButton.setAttribute('data-translate', 'next');
    nextButton.disabled = currentPage === totalPages;
    nextButton.addEventListener('click', () => {
        if (currentPage < totalPages) callback(currentPage + 1);
    });
    paginationContainer.appendChild(nextButton);
}

function formatDate(date, short = false) {
    const now = new Date();
    const diffInDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
    
    if (short) {
        const options = { weekday: 'short' };
        return new Intl.DateTimeFormat(currentLanguage === 'ru' ? 'ru-RU' : 'en-US', options).format(date);
    }
    
            if (diffInDays === 0) return TranslationUtils.get('today');
        else if (diffInDays === 1) return TranslationUtils.get('yesterday');
        else if (diffInDays < 7) return `${diffInDays} ${TranslationUtils.get('days_ago')}`;
    else {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return new Intl.DateTimeFormat(currentLanguage === 'ru' ? 'ru-RU' : 'en-US', options).format(date);
    }
}

async function doExportTransactions(format) {
    try {
        // Show loading state
        const exportBtn = document.getElementById('exportCurrent');
        const originalText = exportBtn ? exportBtn.innerHTML : '';
        if (exportBtn) {
            exportBtn.innerHTML = '<div class="spinner"></div> Generating PDF...';
            exportBtn.disabled = true;
        }

        const headers = {
            'Content-Type': 'application/json'
        };
        
        if (window.Telegram?.WebApp?.initData) {
            headers['x-telegram-init-data'] = window.Telegram.WebApp.initData;
            console.log('Using x-telegram-init-data header');
        } else if (user?.id && user.id !== undefined && user.id !== null && user.id !== 'undefined') {
            headers['x-telegram-id'] = user.id.toString();
            console.log('Using x-telegram-id header from user object:', user.id);
        } else {
            const telegramUserId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
            if (telegramUserId && telegramUserId !== undefined && telegramUserId !== null && telegramUserId !== 'undefined') {
                headers['x-telegram-id'] = telegramUserId.toString();
                console.log('Using x-telegram-id header from initDataUnsafe:', telegramUserId);
            }
        }

        const response = await fetch(`${BASE_API_URL}/api/export-transactions-pdf`, {
            method: 'POST',
            headers: headers
        });

        console.log('Export response status:', response.status);
        const respContentType = response.headers.get('content-type') || '';
        
        if (!response.ok) {
            const errorText = await response.text();
            console.error('Export response error:', errorText);
            let errorMessage = 'Export failed';
            try {
                const errorData = JSON.parse(errorText);
                errorMessage = errorData.error || errorMessage;
            } catch (e) {
                errorMessage = errorText || errorMessage;
            }
            throw new Error(`HTTP ${response.status}: ${errorMessage}`);
        }
        
        // Handle PDF blob
        let blob;
        if (respContentType.includes('application/pdf')) {
            blob = await response.blob();
        } else if (respContentType.includes('application/json')) {
            const result = await response.json();
            if (result && result.success) {
                Swal.fire({
                    title: TranslationUtils.get('success'),
                    text: '📄 PDF has been sent to your Telegram!',
                    icon: 'success',
                    confirmButtonText: TranslationUtils.get('close'),
                    confirmButtonColor: '#4f46e5'
                });
                return;
            }
            throw new Error(result && result.error || 'Export failed');
        } else {
            throw new Error('Unexpected response format');
        }
        
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');

async function doExportReferrals(format) {
    try {
        // Show loading state
        const exportBtn = document.getElementById('exportCurrent');
        const originalText = exportBtn ? exportBtn.innerHTML : '';
        if (exportBtn) {
            exportBtn.innerHTML = '<div class="spinner"></div> Generating PDF...';
            exportBtn.disabled = true;
        }

        const headers = {
            'Content-Type': 'application/json'
        };
        
        if (window.Telegram?.WebApp?.initData) {
            headers['x-telegram-init-data'] = window.Telegram.WebApp.initData;
        } else if (user?.id && user.id !== undefined && user.id !== null && user.id !== 'undefined') {
            headers['x-telegram-id'] = user.id.toString();
        } else {
            const telegramUserId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;
            if (telegramUserId && telegramUserId !== undefined && telegramUserId !== null && telegramUserId !== 'undefined') {
                headers['x-telegram-id'] = telegramUserId.toString();
            }
        }

        const response = await fetch(`${BASE_API_URL}/api/export-referrals-pdf`, {
            method: 'POST',
            headers: headers
        });

        if (!response.ok) {
            const errorText = await response.text();
            console.error('Export referrals response error:', errorText);
            let errorMessage = 'Export failed';
            try {
                const errorData = JSON.parse(errorText);
                errorMessage = errorData.error || errorMessage;
            } catch (e) {
                errorMessage = errorText || errorMessage;
            }
            throw new Error(`HTTP ${response.status}: ${errorMessage}`);
        }

        const respContentType = response.headers.get('content-type') || '';
        let blob;
        if (respContentType.includes('application/pdf')) {
            blob = await response.blob();
        } else if (respContentType.includes('application/json')) {
            const result = await response.json();
            if (result && result.success) {
                Swal.fire({
                    title: TranslationUtils.get('success'),
                    text: '📄 PDF has been sent to your Telegram!',
                    icon: 'success',
                    confirmButtonText: TranslationUtils.get('close'),
                    confirmButtonColor: '#4f46e5'
                });
                return;
            }
            throw new Error(result && result.error || 'Export failed');
        } else {
            throw new Error('Unexpected response format');
        }
        
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `referrals_${user?.id || 'user'}_${new Date().toISOString().slice(0, 10)}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => window.URL.revokeObjectURL(url), 1000);
        
        Swal.fire({
            title: TranslationUtils.get('success'),
            text: '📄 PDF statement downloaded!',
            icon: 'success',
            confirmButtonText: TranslationUtils.get('close'),
            confirmButtonColor: '#4f46e5'
        });

    } catch (error) {
        console.error('Export error:', error);
        Swal.fire({
            title: TranslationUtils.get('error'),
            text: 'Failed to export statement. Please try again.',
            icon: 'error',
            confirmButtonText: TranslationUtils.get('close'),
            confirmButtonColor: '#dc2626'
        });
    } finally {
        // Restore button state
        const exportBtn = document.getElementById('exportCurrent');
        if (exportBtn) {
            exportBtn.innerHTML = originalText;
            exportBtn.disabled = false;
        }
    }
}
