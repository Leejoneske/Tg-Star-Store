<script>
// Initialize Telegram WebApp
if (window.Telegram?.WebApp) {
    const webApp = window.Telegram.WebApp;
    webApp.ready();
    webApp.expand();
    
    // Add fullscreen class to body
    document.body.classList.add('telegram-fullscreen');
    
    console.log('Telegram Mini App mode enabled');
}

// Safe DOM manipulation helpers
function safeGetElement(id) {
    const el = document.getElementById(id);
    if (!el) console.warn(`⚠️ Element not found: ${id}`);
    return el;
}

function safeSetDisplay(id, display) {
    const el = safeGetElement(id);
    if (el) el.style.display = display;
}

function safeSetHTML(id, html) {
    const el = safeGetElement(id);
    if (el) el.innerHTML = html;
}

function safeSetText(id, text) {
    const el = safeGetElement(id);
    if (el) el.textContent = text;
}

// Helper function to get valid user ID
function getValidUserId() {
    // Try Telegram WebApp first
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (tgUser?.id) {
        const tgUserId = tgUser.id.toString();
        if (tgUserId !== 'undefined' && tgUserId !== 'null' && !isNaN(tgUserId)) {
            return tgUserId;
        }
    }

    // Try authenticated user ID from window
    if (window.authenticatedUserId && window.authenticatedUserId !== 'undefined' && window.authenticatedUserId !== 'null') {
        return window.authenticatedUserId.toString();
    }

    // Try localStorage (set during previous login)
    try {
        const stored = localStorage.getItem('userId');
        if (stored && stored !== 'undefined' && stored !== 'null' && stored !== 'dev-user') {
            return stored;
        }
    } catch (e) {
        // localStorage not available
    }

    return null; // No valid user ID found
}

// Wait for Telegram WebApp to be ready before resolving user ID.
// The telegram-web-app.js script is loaded with `defer`, so window.Telegram.WebApp
// may be null when this script first parses. We poll briefly and then init.
function waitForTelegramReady(maxWaitMs = 2500) {
    return new Promise((resolve) => {
        const start = Date.now();
        function check() {
            const wa = window.Telegram?.WebApp;
            if (wa && wa.initDataUnsafe) {
                try { wa.ready && wa.ready(); } catch (_) {}
                try { wa.expand && wa.expand(); } catch (_) {}
                return resolve(true);
            }
            if (Date.now() - start >= maxWaitMs) return resolve(false);
            setTimeout(check, 50);
        }
        check();
    });
}

let userId = null;
const BASE_API_URL = window.location.origin + '/api';

let transactionHistory = [];
let referralHistory = [];
let currentTransactionPage = 1;
let currentReferralPage = 1;
let currentTransactionFilter = 'all';
let currentReferralFilter = 'all';
let currentTransactionSearch = '';
let currentReferralSearch = '';
const itemsPerPage = 5;
let currentLanguage = TranslationUtils.getCurrentLanguage();
let authError = false;

// Initialize translations
if (typeof TranslationUtils !== 'undefined') {
    TranslationUtils.init();
}

// Listen for language changes from other pages
window.addEventListener('languageChanged', () => {
    currentLanguage = TranslationUtils.getCurrentLanguage();
    updateLanguage();
});

// Also listen for localStorage changes (when language is changed in another tab/page)
window.addEventListener('storage', (e) => {
    if (e.key === 'appLanguage') {
        currentLanguage = TranslationUtils.getCurrentLanguage();
        updateLanguage();
    }
});

document.addEventListener('DOMContentLoaded', async () => {
    // Wait for Telegram WebApp to initialize before checking user id
    await waitForTelegramReady();
    userId = getValidUserId();
    authError = !userId;
    initApp();
});



function initApp() {
    // Load page content regardless of userId
    // If userId is not available, API calls will handle it gracefully
    if (!userId) {
        console.warn('⚠️ No valid user ID detected - history will be empty');
        authError = true;
    }
    
    updateLanguage();
    setupEventListeners();
    loadTransactionHistory();
    loadReferralHistory();
    window.addEventListener('storage', (event) => {
        if (event.key === 'appLanguage') {
            currentLanguage = event.newValue || 'en';
            updateLanguage();
        }
    });
    // Bottom nav is auto-loaded by /js/bottomnav-init.js?v=6 when #bottomnav-container exists.
}

function setupEventListeners() {
    document.getElementById('transactionsTab').addEventListener('click', () => switchTab('transactions'));
    document.getElementById('referralsTab').addEventListener('click', () => switchTab('referrals'));
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const filter = btn.getAttribute('data-filter');
            currentTransactionFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            btn.classList.add('filter-active');
            currentTransactionPage = 1;
            updateTransactionList();
        });
    });
    document.querySelectorAll('.ref-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const filter = btn.getAttribute('data-filter');
            currentReferralFilter = filter;
            document.querySelectorAll('.ref-filter-btn').forEach(b => b.classList.remove('filter-active'));
            btn.classList.add('filter-active');
            currentReferralPage = 1;
            updateReferralList();
        });
    });
    document.getElementById('searchTransactions').addEventListener('input', (e) => {
        currentTransactionSearch = e.target.value.trim();
        currentTransactionPage = 1;
        updateTransactionList();
    });
    document.getElementById('searchReferrals').addEventListener('input', (e) => {
        currentReferralSearch = e.target.value.trim();
        currentReferralPage = 1;
        updateReferralList();
    });
    document.getElementById('exportTransactions').addEventListener('click', exportTransactions);
    document.getElementById('exportReferrals').addEventListener('click', exportReferrals);
}

function switchTab(tab) {
    if (tab === 'transactions') {
        document.getElementById('transactionsTab').classList.add('tab-active');
        document.getElementById('referralsTab').classList.remove('tab-active');
        document.getElementById('transactionsContent').classList.add('active');
        document.getElementById('referralsContent').classList.remove('active');
    } else {
        document.getElementById('referralsTab').classList.add('tab-active');
        document.getElementById('transactionsTab').classList.remove('tab-active');
        document.getElementById('referralsContent').classList.add('active');
        document.getElementById('transactionsContent').classList.remove('active');
    }
}

function updateLanguage() {
    // Use TranslationUtils for better translation management
    if (typeof TranslationUtils !== 'undefined') {
        TranslationUtils.applyTranslations();
    }
    if (transactionHistory.length > 0) updateTransactionList();
    if (referralHistory.length > 0) updateReferralList();
}

function loadTransactionHistory() {
    LoadingComponent.show('transactionsLoading', 'cards', { count: 3 });
    safeSetDisplay('transactionsList', 'none');
    safeSetDisplay('transactionsEmpty', 'none');

    if (!userId) {
        console.error('❌ Cannot load transactions: No valid user ID');
        LoadingComponent.hide('transactionsLoading');
        safeSetDisplay('transactionsEmpty', 'flex');
        transactionHistory = [];
        authError = true;
        return;
    }

    const headers = {
        'x-telegram-id': userId,
        'Content-Type': 'application/json'
    };
    
    // Add init data if available
    if (window.Telegram?.WebApp?.initData) {
        headers['x-telegram-init-data'] = window.Telegram.WebApp.initData;
    }

    fetch(`${BASE_API_URL}/transactions/${userId}`, {
        headers: headers
    })
    .then(response => {
        if (!response.ok) {
            if (response.status === 401 || response.status === 404) {
                console.error(`❌ Authentication error (${response.status}): User not found or unauthorized`);
                authError = true;
            }
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        console.log('📊 [Frontend] API Response:', data);
        // Handle both direct array and wrapped response
        const transactions = data.transactions || data;
        
        if (!Array.isArray(transactions)) {
            console.error('❌ Transactions is not an array:', transactions);
            transactionHistory = [];
            updateTransactionList();
            return;
        }
        
        console.log(`📊 [Frontend] Processing ${transactions.length} transactions`);
        transactionHistory = transactions.map(item => {
            return {
                ...item,
                status: mapOrderStatus(item.status),
                date: new Date(item.date)
            };
        });
        
        console.log('📊 [Frontend] Transaction history updated:', transactionHistory);
        updateTransactionList();
    })
    .catch(error => {
        console.error('❌ [Frontend] Error loading transactions:', error);
        LoadingComponent.hide('transactionsLoading');
        safeSetDisplay('transactionsEmpty', 'flex');
        transactionHistory = [];
    });
}

function mapOrderStatus(status) {
    // Don't map statuses - use them as-is
    // This allows frontend to display the actual status (failed, expired, declined, etc)
    if (!status || typeof status !== 'string') return 'processing';
    return status.toLowerCase();
}

function mapReferralStatus(status) {
    const statusMap = {
        'completed': 'active',
        'active': 'active',
        'pending': 'processing',
        'processing': 'processing'
    };
    if (!status || typeof status !== 'string') return 'processing';
    return statusMap[status.toLowerCase()] || 'processing';
}

function updateTransactionList() {
    
    let filteredTransactions = transactionHistory.filter(txn => {
        // Filter by status
        if (currentTransactionFilter !== 'all') {
            // For declined filter, include declined, failed, and expired statuses
            if (currentTransactionFilter === 'declined') {
                if (txn.status !== 'declined' && txn.status !== 'failed' && txn.status !== 'expired') return false;
            } else {
                // For other filters, match exactly
                if (txn.status !== currentTransactionFilter) return false;
            }
        }
        // Filter by search
        if (currentTransactionSearch) {
            const searchLower = currentTransactionSearch.toLowerCase();
            return (
                (txn.id || '').toString().toLowerCase().includes(searchLower) ||
                (txn.type || '').toString().toLowerCase().includes(searchLower) ||
                (txn.amount ?? '').toString().toLowerCase().includes(searchLower) ||
                (txn.status || '').toString().toLowerCase().includes(searchLower) ||
                (txn.details || '').toString().toLowerCase().includes(searchLower)
            );
        }
        return true;
    });
    
    const totalPages = Math.ceil(filteredTransactions.length / itemsPerPage);
    const startIndex = (currentTransactionPage - 1) * itemsPerPage;
    const paginatedTransactions = filteredTransactions.slice(startIndex, startIndex + itemsPerPage);
    

    
    updateTransactionCounts(filteredTransactions);
    LoadingComponent.hide('transactionsLoading');
    
    if (paginatedTransactions.length === 0) {
        safeSetDisplay('transactionsList', 'none');
        safeSetDisplay('transactionsEmpty', 'flex');
    } else {
        safeSetDisplay('transactionsList', 'block');
        safeSetDisplay('transactionsEmpty', 'none');
        
        const transactionsList = safeGetElement('transactionsList');
        if (transactionsList) {
            transactionsList.innerHTML = '';
        
        paginatedTransactions.forEach(txn => {
            const txnCard = document.createElement('div');
            txnCard.className = 'transaction-card bg-white p-3';
            const dateStr = formatDate(txn.date);
            let statusClass = '';
            let statusText = '';
            
            switch(txn.status) {
                case 'completed':
                    statusClass = 'status-completed';
                    statusText = TranslationUtils.get('completed');
                    break;
                case 'processing':
                    statusClass = 'status-processing';
                    statusText = TranslationUtils.get('processing');
                    break;
                case 'declined':
                    statusClass = 'status-declined';
                    statusText = TranslationUtils.get('declined');
                    break;
                case 'failed':
                    statusClass = 'status-failed';
                    statusText = TranslationUtils.get('failed');
                    break;
                case 'expired':
                    statusClass = 'status-expired';
                    statusText = TranslationUtils.get('expired');
                    break;
            }
            
            txnCard.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div class="font-medium">${txn.type}</div>
                    <div class="text-sm text-gray-500">${dateStr}</div>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-xs text-gray-500 mb-1">${txn.id}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-semibold">${txn.amount} ★</div>
                        ${txn.usdtValue ? `<div class="text-sm text-gray-600">${txn.usdtValue.toFixed(3)} USDT</div>` : ''}
                    </div>
                </div>
            `;
            txnCard.addEventListener('click', () => showTransactionDetails(txn));
            transactionsList.appendChild(txnCard);
        });
        }
    }
    
    updatePagination('transactionsPagination', currentTransactionPage, totalPages, (page) => {
        currentTransactionPage = page;
        updateTransactionList();
    });
}

function updateTransactionCounts(transactions) {
    const completedCountEl = document.getElementById('completedCount');
    const processingCountEl = document.getElementById('processingCount');
    const declinedCountEl = document.getElementById('declinedCount');
    
    if (completedCountEl) {
        completedCountEl.textContent = transactions.filter(t => t.status === 'completed').length;
    }
    if (processingCountEl) {
        processingCountEl.textContent = transactions.filter(t => t.status === 'processing').length;
    }
    if (declinedCountEl) {
        const declinedCount = transactions.filter(t => t.status === 'declined' || t.status === 'failed' || t.status === 'expired').length;
        declinedCountEl.textContent = declinedCount;
    }
}


function updatePagination(elementId, currentPage, totalPages, callback) {
    const paginationContainer = document.getElementById(elementId);
    if (!paginationContainer) {
        console.warn(`⚠️ Pagination container not found: ${elementId}`);
        return;
    }
    paginationContainer.innerHTML = '';
    if (totalPages <= 1) return;
    
    const prevButton = document.createElement('button');
    prevButton.className = 'pagination-btn border';
    prevButton.innerHTML = '&lt;';
    prevButton.setAttribute('data-translate', 'previous');
    prevButton.disabled = currentPage === 1;
    prevButton.addEventListener('click', () => {
        if (currentPage > 1) callback(currentPage - 1);
    });
    paginationContainer.appendChild(prevButton);
    
    const maxVisiblePages = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    
    if (endPage - startPage + 1 < maxVisiblePages) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
    }
    
    if (startPage > 1) {
        const firstButton = document.createElement('button');
        firstButton.className = 'pagination-btn border';
        firstButton.textContent = '1';
        firstButton.addEventListener('click', () => callback(1));
        paginationContainer.appendChild(firstButton);
        
        if (startPage > 2) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'px-2';
            ellipsis.textContent = '...';
            ellipsis.setAttribute('data-translate', 'ellipsis');
            paginationContainer.appendChild(ellipsis);
        }
    }
    
    for (let i = startPage; i <= endPage; i++) {
        const pageButton = document.createElement('button');
        pageButton.className = `pagination-btn border ${i === currentPage ? 'active' : ''}`;
        pageButton.textContent = i;
        pageButton.addEventListener('click', () => callback(i));
        paginationContainer.appendChild(pageButton);
    }
    
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            const ellipsis = document.createElement('span');
            ellipsis.className = 'px-2';
            ellipsis.textContent = '...';
            ellipsis.setAttribute('data-translate', 'ellipsis');
            paginationContainer.appendChild(ellipsis);
        }
        
        const lastButton = document.createElement('button');
        lastButton.className = 'pagination-btn border';
        lastButton.textContent = totalPages;
        lastButton.addEventListener('click', () => callback(totalPages));
        paginationContainer.appendChild(lastButton);
    }
    
    const nextButton = document.createElement('button');
    nextButton.className = 'pagination-btn border';
    nextButton.innerHTML = '&gt;';
    nextButton.setAttribute('data-translate', 'next');
    nextButton.disabled = currentPage === totalPages;
    nextButton.addEventListener('click', () => {
        if (currentPage < totalPages) callback(currentPage + 1);
    });
    paginationContainer.appendChild(nextButton);
}

function formatDate(date, short = false) {
    const now = new Date();
    const diffInDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
    
    if (short) {
        const options = { weekday: 'short' };
        return new Intl.DateTimeFormat(currentLanguage === 'ru' ? 'ru-RU' : 'en-US', options).format(date);
    }
    
            if (diffInDays === 0) return TranslationUtils.get('today');
        else if (diffInDays === 1) return TranslationUtils.get('yesterday');
        else if (diffInDays < 7) return `${diffInDays} ${TranslationUtils.get('days_ago')}`;
    else {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return new Intl.DateTimeFormat(currentLanguage === 'ru' ? 'ru-RU' : 'en-US', options).format(date);
    }
}

async function exportTransactions() {
    // Show PDF download modal
    const modal = document.getElementById('exportFormatModal');
    modal.style.display = 'flex';
    
    // Cancel button
    document.getElementById('exportFormatCancel').onclick = () => {
        modal.style.display = 'none';
    };
    
    // PDF export
    document.getElementById('exportFormatPDF').onclick = async () => {
        modal.style.display = 'none';
        await doExportTransactions('pdf');
    };
}

async function doExportTransactions(format) {
    try {
        // Show loading state
        const exportBtn = document.getElementById('exportTransactions');
        const originalText = exportBtn.innerHTML;
        exportBtn.innerHTML = '<div class="spinner"></div> Generating PDF...';
        exportBtn.disabled = true;

        const headers = {
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache',
            'Expires': '0'
        };
        
        if (window.Telegram?.WebApp?.initData) {
            headers['x-telegram-init-data'] = window.Telegram.WebApp.initData;
            console.log('Using x-telegram-init-data header');
        } else if (userId) {
            headers['x-telegram-id'] = userId.toString();
            console.log('Using x-telegram-id header from userId:', userId);
        } else {
            console.error('❌ No valid user ID for export');
            throw new Error('User authentication required');
        }

            body: JSON.stringify({ timestamp: Date.now() })
        });

        const respContentType = response.headers.get('content-type') || '';
        
        if (!response.ok) {

                errorMessage = errorData.error || errorMessage;

            }
