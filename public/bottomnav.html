<div class="fixed bottom-0 left-0 right-0 z-50" style="padding-bottom: env(safe-area-inset-bottom); background: var(--surface); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;">
	<div style="max-width:600px;margin:0 auto;">
		<nav>
			<ul class="nav-ul" style="color: var(--text-secondary);">
				<li>
					<a href="index.html" class="nav-link" data-page="home">
						<i class="fas fa-home" style="font-size: 18px;"></i>
						<span data-translate="home">Home</span>
					</a>
				</li>
				<li>
					<a href="sell.html" class="nav-link" data-page="sell">
						<i class="fas fa-dollar-sign" style="font-size: 18px;"></i>
						<span data-translate="sell">Sell</span>
					</a>
				</li>
				<li>
					<a href="history.html" class="nav-link" data-page="history">
						<i class="fas fa-list" style="font-size: 18px;"></i>
						<span data-translate="history">History</span>
					</a>
				</li>
				<li>
					<a href="javascript:void(0)" onclick="navigateToReferral()" class="nav-link" data-page="referral">
						<i class="fas fa-user-friends" style="font-size: 18px;"></i>
						<span data-translate="referral">Referral</span>
					</a>
				</li>
				<li>
					<a href="about.html" class="nav-link" data-page="about">
						<i class="fas fa-info-circle" style="font-size: 18px;"></i>
						<span data-translate="about">About</span>
					</a>
				</li>
			</ul>
		</nav>
	</div>
</div>

<style>
.nav-ul {
	display: grid;
	grid-template-columns: repeat(5, 1fr);
	list-style: none;
	margin: 0;
	padding: 0;
	font-size: 12px;
	width: 100%;
}

.nav-ul li {
	display: flex;
	justify-content: center;
	align-items: center;
}

.nav-link {
	color: var(--text-secondary);
	text-decoration: none;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding: 8px 0;
	transition: color 0.2s ease;
	width: 100%;
	text-align: center;
}

.nav-link:hover {
	color: var(--brand);
}

.nav-link.active {
	color: var(--brand);
}

.nav-link.active i {
	color: var(--brand);
}

.nav-link.active span {
	color: var(--brand);
	font-weight: 600;
}
</style>

<script>
// Immediately invoked function to avoid global pollution
(function() {
	// Function to determine current page
	function getCurrentPage() {
		const path = window.location.pathname;
		const filename = path.split('/').pop();
		
		switch(filename) {
			case 'index.html':
			case '':
			case 'app':
				return 'home';
			case 'sell.html':
			case 'sell':
				return 'sell';
			case 'history.html':
			case 'history':
				return 'history';
			case 'referral.html':
			case 'referral':
				return 'referral';
			case 'about.html':
			case 'about':
				return 'about';
			default:
				return 'home';
		}
	}

	// Function to set active navigation based on current page
	function setActiveNavigation() {
		const currentPage = getCurrentPage();
		const navLinks = document.querySelectorAll('.nav-link');
		
		navLinks.forEach(link => {
			link.classList.remove('active');
			if (link.getAttribute('data-page') === currentPage) {
				link.classList.add('active');
			}
		});
	}

	// Set active navigation immediately
	setActiveNavigation();

	// Function to navigate to referral page
	window.navigateToReferral = function() {
		// Use fetch to get the authenticated referral page content
		fetch('/referral', {
			method: 'GET',
			headers: {
				'Accept': 'text/html'
			}
		})
		.then(response => {
			if (response.ok) {
				return response.text();
			} else {
				throw new Error('Failed to load referral page');
			}
		})
		.then(html => {
			// Replace the current page content with the referral page
			document.documentElement.innerHTML = html;
			// Re-execute any scripts in the new HTML
			const scripts = document.querySelectorAll('script');
			scripts.forEach(script => {
				if (script.src) {
					const newScript = document.createElement('script');
					newScript.src = script.src;
					document.head.appendChild(newScript);
				} else {
					eval(script.textContent);
				}
			});
			// Update URL without page reload
			history.pushState(null, '', '/referral');
		})
		.catch(error => {
			console.error('Error loading referral page:', error);
			// Fallback to direct navigation
			window.location.href = '/referral';
		});
	};
})();
</script>
